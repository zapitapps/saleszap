<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalesZap • Login</title>
  <style>
    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-card: rgba(255, 255, 255, 0.7);
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --border-color: rgba(0, 0, 0, 0.06);
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
      --glass-bg: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(255, 255, 255, 0.2);
      --accent: #25d366;
      --accent-dark: #128c7e;
      --gradient: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      --radius: 20px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --input-bg: rgba(255, 255, 255, 0.8);
    }
    [data-theme="dark"] {
      --bg-primary: #0b0f1a;
      --bg-secondary: #111827;
      --bg-card: rgba(17, 24, 39, 0.8);
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.06);
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      --glass-bg: rgba(17, 24, 39, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(255, 255, 255, 0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background var(--transition), color var(--transition);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .login-container {
      width: 100%;
      max-width: 420px;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      box-shadow: var(--shadow);
      transition: background var(--transition), border-color var(--transition);
    }
    .logo {
      text-align: center;
      font-weight: 900;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }
    .logo span { color: var(--accent); }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .form-group { margin-bottom: 1.2rem; }
    label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.3rem;
    }
    input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.15);
    }
    .btn-primary {
      width: 100%;
      background: var(--gradient);
      color: #fff;
      font-weight: 700;
      padding: 0.9rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.25);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(37, 211, 102, 0.4);
    }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error-msg {
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      display: none;
    }
    .error-msg.show { display: block; }
    .footer-links {
      display: flex;
      justify-content: space-between;
      margin-top: 1.5rem;
      font-size: 0.85rem;
    }
    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--accent); }
    .theme-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 30px;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      font-size: 1.2rem;
      box-shadow: var(--shadow);
      transition: background var(--transition), border-color var(--transition);
      backdrop-filter: blur(8px);
    }
    .theme-toggle:hover { background: var(--border-color); }
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    @media (max-width: 480px) { .login-container { padding: 2rem 1.5rem; } }
  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>

  <div class="login-container reveal">
    <div class="logo">⚡Sales<span>Zap</span></div>
    <p class="subtitle">Welcome back – log in to your dashboard</p>

    <form id="loginForm" autocomplete="off">
      <div class="form-group">
        <label for="identifier">Username or Email</label>
        <input type="text" id="identifier" placeholder="e.g., mubaz or mubaz@email.com" required />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <div class="error-msg" id="loginError">Invalid credentials. Please try again.</div>
      <button type="submit" class="btn-primary" id="loginBtn">Log In →</button>
    </form>

    <div class="footer-links">
      <a href="forgot-password.html">Forgot password?</a>
      <a href="easy_signup.html">Create account</a>
    </div>
  </div>

  <script>
    // ─── THEME ──────────────────────────────────────────────
    (function initTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
    })();
    document.getElementById('themeToggle').addEventListener('click', function() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      this.textContent = next === 'dark' ? '☀️' : '🌙';
    });

    // ─── LOGIN ──────────────────────────────────────────────
    const BACKEND_URL = 'https://vendrai-api.onrender.com'; // update if needed
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const btn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const identifier = document.getElementById('identifier').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!identifier || !password) {
        errorEl.textContent = 'Please fill in all fields.';
        errorEl.classList.add('show');
        return;
      }
      errorEl.classList.remove('show');
      btn.disabled = true;
      btn.textContent = '⏳ Logging in...';

      try {
        const res = await fetch(`${BACKEND_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ identifier, password })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('vendr_token', data.session_token);
          localStorage.setItem('vendr_biz_id', data.business?.id || '');
          window.location.href = 'dashboard.html';
        } else {
          errorEl.textContent = data.error || 'Login failed. Please try again.';
          errorEl.classList.add('show');
          btn.disabled = false;
          btn.textContent = 'Log In →';
        }
      } catch (err) {
        errorEl.textContent = 'Could not connect to server. Check your internet.';
        errorEl.classList.add('show');
        btn.disabled = false;
        btn.textContent = 'Log In →';
      }
    });
  </script>
</body>
</html>
