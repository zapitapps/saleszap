<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VendrAI — Login or Create Account</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap');
    *{font-family:'Inter',sans-serif;box-sizing:border-box;}
    body{background:#0B0F1A;color:#E2E8F0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px;}
    .card{background:#111827;border:1px solid rgba(255,255,255,0.07);border-radius:20px;padding:32px;width:100%;max-width:440px;}
    .inp{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:10px;padding:12px 14px;color:white;font-size:.875rem;outline:none;transition:border-color .2s;margin-bottom:0;}
    .inp:focus{border-color:#25D366;}
    .inp::placeholder{color:#4B5563;}
    .btn-green{width:100%;background:linear-gradient(135deg,#25D366,#128C7E);color:white;border:none;padding:14px;border-radius:12px;font-size:.95rem;font-weight:700;cursor:pointer;transition:all .2s;box-shadow:0 0 25px rgba(37,211,102,.3);}
    .btn-green:hover{opacity:.9;transform:translateY(-1px);}
    .btn-green:disabled{opacity:.6;cursor:not-allowed;transform:none;}
    .tab-btn{flex:1;padding:10px;text-align:center;border-radius:10px;cursor:pointer;font-size:.85rem;font-weight:600;transition:all .2s;color:#64748B;border:none;background:transparent;}
    .tab-btn.active{background:rgba(37,211,102,.1);color:#25D366;}
    .error-msg{color:#F87171;font-size:.8rem;margin-top:4px;display:none;}
    .error-msg.show{display:block;}
    label{display:block;font-size:.75rem;color:#9CA3AF;margin-bottom:5px;margin-top:14px;}
    label:first-child{margin-top:0;}
    .strength{height:4px;border-radius:2px;transition:all .3s;margin-top:4px;}
    .toast-fixed{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);opacity:0;transition:all .4s;background:#111827;border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 20px;font-size:.85rem;font-weight:600;white-space:nowrap;z-index:999;}
    .toast-fixed.show{transform:translateX(-50%) translateY(0);opacity:1;}
  </style>
</head>
<body>
<div class="card">
  <!-- Logo -->
  <div class="text-center mb-8">
    <div style="width:52px;height:52px;background:linear-gradient(135deg,#25D366,#128C7E);border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 12px;">🤖</div>
    <h1 class="text-2xl font-black">Vendr<span style="color:#25D366">AI</span></h1>
    <p class="text-gray-500 text-sm mt-1">AI WhatsApp Automation for African SMEs</p>
  </div>

  <!-- Tabs -->
  <div class="flex bg-white/5 rounded-xl p-1 mb-6">
    <button class="tab-btn active" id="tab-login" onclick="switchTab('login')">Login</button>
    <button class="tab-btn" id="tab-register" onclick="switchTab('register')">Create Account</button>
  </div>

  <!-- LOGIN FORM -->
  <form id="loginForm" onsubmit="doLogin(event)">
    <div>
      <label>Username or Email</label>
      <input id="l-id" class="inp" placeholder="yourname or you@email.com" required autocomplete="username"/>
    </div>
    <div>
      <label>Password</label>
      <input id="l-pw" type="password" class="inp" placeholder="Your password" required autocomplete="current-password"/>
    </div>
    <div class="flex justify-end mt-2 mb-5">
      <button type="button" onclick="switchTab('forgot')" class="text-xs text-gray-500 hover:text-green-400">Forgot password?</button>
    </div>
    <div id="loginErr" class="error-msg mb-4"></div>
    <button type="submit" id="loginBtn" class="btn-green">Login to Dashboard →</button>
    <p class="text-center text-xs text-gray-600 mt-4">Don't have an account? <button type="button" onclick="switchTab('register')" class="text-green-400 hover:underline">Sign up free</button></p>
  </form>

  <!-- REGISTER FORM -->
  <form id="registerForm" class="hidden" onsubmit="doRegister(event)">
    <div>
      <label>Username * <span class="text-gray-600">(3-30 chars, letters/numbers/underscore)</span></label>
      <input id="r-user" class="inp" placeholder="e.g. amarafashion or kingsley_ng" required autocomplete="username" oninput="checkUsername(this.value)"/>
      <div id="usernameMsg" class="text-xs mt-1 text-gray-500"></div>
    </div>
    <div>
      <label>Business Name *</label>
      <input id="r-biz" class="inp" placeholder="e.g. Amara Fashion Boutique" required/>
    </div>
    <div>
      <label>Email Address *</label>
      <input id="r-email" type="email" class="inp" placeholder="you@yourbusiness.com" required autocomplete="email"/>
    </div>
    <div>
      <label>Phone Number * <span class="text-gray-600">(with country code)</span></label>
      <input id="r-phone" type="tel" class="inp" placeholder="+2348012345678" required/>
    </div>
    <div>
      <label>Password * <span class="text-gray-600">(min 8 characters)</span></label>
      <input id="r-pw" type="password" class="inp" placeholder="Create a strong password" required oninput="checkStrength(this.value)"/>
      <div class="strength mt-1" id="strengthBar" style="width:0;background:#EF4444"></div>
      <div class="text-xs text-gray-600 mt-1" id="strengthText"></div>
    </div>
    <div>
      <label>Referral Code <span class="text-gray-600">(optional)</span></label>
      <input id="r-ref" class="inp" placeholder="e.g. VND-ABC123"/>
    </div>
    <div id="registerErr" class="error-msg mb-4 mt-2"></div>
    <div class="mt-5">
      <button type="submit" id="registerBtn" class="btn-green">🚀 Create Free Account</button>
    </div>
    <p class="text-center text-xs text-gray-600 mt-4">By signing up, you agree to our Terms. No spam — ever.</p>
    <p class="text-center text-xs text-gray-600 mt-2">Already have an account? <button type="button" onclick="switchTab('login')" class="text-green-400 hover:underline">Login</button></p>
  </form>

  <!-- FORGOT PASSWORD FORM -->
  <form id="forgotForm" class="hidden" onsubmit="doForgot(event)">
    <div class="text-center mb-6">
      <div class="text-3xl mb-2">🔑</div>
      <h3 class="font-bold">Reset Your Password</h3>
      <p class="text-sm text-gray-400 mt-1">Enter your email and we'll send a reset code.</p>
    </div>
    <div>
      <label>Email Address</label>
      <input id="f-email" type="email" class="inp" placeholder="you@yourbusiness.com" required/>
    </div>
    <div id="forgotErr" class="error-msg mt-2 mb-4"></div>
    <div class="mt-5">
      <button type="submit" class="btn-green">Send Reset Code →</button>
    </div>
    <p class="text-center mt-4"><button type="button" onclick="switchTab('login')" class="text-xs text-gray-500 hover:text-green-400">← Back to login</button></p>
  </form>

  <!-- VERIFY EMAIL FORM -->
  <div id="verifyForm" class="hidden text-center">
    <div class="text-4xl mb-3">📧</div>
    <h3 class="font-bold text-lg mb-2">Verify Your Email</h3>
    <p class="text-sm text-gray-400 mb-6">We sent a 6-digit code to <span id="verifyEmail" class="text-white font-medium"></span></p>
    <input id="v-otp" class="inp text-center text-2xl tracking-widest mb-4" maxlength="6" placeholder="000000"/>
    <button onclick="doVerify()" class="btn-green mb-3">Verify Email ✅</button>
    <p class="text-xs text-gray-500">Didn't get it? <button onclick="resendOTP()" class="text-green-400 hover:underline">Resend code</button></p>
    <p class="text-xs text-gray-600 mt-3"><button onclick="skipVerify()" class="hover:text-gray-400">Skip for now →</button></p>
  </div>
</div>

<!-- Toast -->
<div id="toast" class="toast-fixed"></div>

<script>
const API = 'https://vendrai-api.onrender.com'; // ← UPDATE THIS

// Auto-redirect if already logged in
const existingToken = localStorage.getItem('vendrai_token');
if (existingToken) window.location.href = 'dashboard.html';

// Pre-fill referral code from URL
const urlRef = new URLSearchParams(location.search).get('ref');
if (urlRef && document.getElementById('r-ref')) document.getElementById('r-ref').value = urlRef;

function switchTab(tab) {
  ['loginForm','registerForm','forgotForm','verifyForm'].forEach(id => document.getElementById(id)?.classList.add('hidden'));
  ['tab-login','tab-register'].forEach(id => document.getElementById(id)?.classList.remove('active'));
  if (tab === 'login')    { document.getElementById('loginForm').classList.remove('hidden'); document.getElementById('tab-login').classList.add('active'); }
  if (tab === 'register') { document.getElementById('registerForm').classList.remove('hidden'); document.getElementById('tab-register').classList.add('active'); }
  if (tab === 'forgot')   { document.getElementById('forgotForm').classList.remove('hidden'); }
  if (tab === 'verify')   { document.getElementById('verifyForm').classList.remove('hidden'); }
}

function showToast(msg, color='#25D366') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.borderColor = color;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3500);
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  el.textContent = msg; el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 5000);
}

// Username availability check (debounced)
let usernameTimer;
function checkUsername(val) {
  const el = document.getElementById('usernameMsg');
  clearTimeout(usernameTimer);
  if (!val) { el.textContent = ''; return; }
  if (!/^[a-zA-Z0-9_]{3,30}$/.test(val)) {
    el.textContent = '❌ Only letters, numbers, underscores. 3-30 chars.';
    el.className = 'text-xs mt-1 text-red-400'; return;
  }
  el.textContent = '⏳ Checking...'; el.className = 'text-xs mt-1 text-gray-400';
  usernameTimer = setTimeout(async () => {
    // We'll just show "looks good" for now — server validates on submit
    el.textContent = '✅ Looks good!'; el.className = 'text-xs mt-1 text-green-400';
  }, 600);
}

function checkStrength(pw) {
  const bar = document.getElementById('strengthBar');
  const txt = document.getElementById('strengthText');
  if (!pw) { bar.style.width='0'; txt.textContent=''; return; }
  let score = 0;
  if (pw.length >= 8)  score++;
  if (pw.length >= 12) score++;
  if (/[A-Z]/.test(pw)) score++;
  if (/[0-9]/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const levels = [
    { w:'20%',  color:'#EF4444', label:'Weak' },
    { w:'40%',  color:'#F97316', label:'Fair' },
    { w:'60%',  color:'#EAB308', label:'Good' },
    { w:'80%',  color:'#22C55E', label:'Strong' },
    { w:'100%', color:'#10B981', label:'Very Strong' },
  ];
  const level = levels[Math.min(score, 4)];
  bar.style.width = level.w; bar.style.background = level.color;
  txt.textContent = level.label; txt.style.color = level.color;
}

// ── LOGIN ──
async function doLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('loginBtn');
  btn.textContent = '⏳ Logging in...'; btn.disabled = true;
  try {
    const res = await fetch(`${API}/auth/login`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ identifier: document.getElementById('l-id').value.trim(), password: document.getElementById('l-pw').value }),
    });
    const d = await res.json();
    if (d.success) {
      localStorage.setItem('vendrai_token', d.session_token);
      localStorage.setItem('vendrai_biz_id', d.business.id);
      showToast('✅ Login successful! Loading dashboard...');
      setTimeout(() => window.location.href = 'dashboard.html', 800);
    } else {
      showErr('loginErr', d.error || 'Login failed. Please try again.');
      btn.textContent = 'Login to Dashboard →'; btn.disabled = false;
    }
  } catch(err) {
    showErr('loginErr', '⚠️ Could not connect. Check your internet and try again.');
    btn.textContent = 'Login to Dashboard →'; btn.disabled = false;
  }
}

// ── REGISTER ──
async function doRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('registerBtn');
  btn.textContent = '⏳ Creating account...'; btn.disabled = true;
  try {
    const res = await fetch(`${API}/auth/register`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username:     document.getElementById('r-user').value.trim().toLowerCase(),
        businessName: document.getElementById('r-biz').value.trim(),
        email:        document.getElementById('r-email').value.trim().toLowerCase(),
        phone:        document.getElementById('r-phone').value.trim(),
        password:     document.getElementById('r-pw').value,
        referralCode: document.getElementById('r-ref').value.trim() || undefined,
      }),
    });
    const d = await res.json();
    if (d.success) {
      localStorage.setItem('vendrai_token', d.session_token);
      localStorage.setItem('vendrai_biz_id', d.business.id);
      document.getElementById('verifyEmail').textContent = document.getElementById('r-email').value;
      switchTab('verify');
      showToast('✅ Account created! Please verify your email.');
    } else {
      showErr('registerErr', d.error || 'Registration failed.');
      btn.textContent = '🚀 Create Free Account'; btn.disabled = false;
    }
  } catch(err) {
    showErr('registerErr', '⚠️ Could not connect. Check your internet.');
    btn.textContent = '🚀 Create Free Account'; btn.disabled = false;
  }
}

// ── VERIFY EMAIL ──
async function doVerify() {
  const otp   = document.getElementById('v-otp').value.trim();
  const token = localStorage.getItem('vendrai_token');
  if (otp.length !== 6) { showToast('Enter the 6-digit code from your email', '#EAB308'); return; }
  const res = await fetch(`${API}/auth/verify-email`, {
    method: 'POST', headers: { 'Content-Type': 'application/json', 'x-session-token': token },
    body: JSON.stringify({ otp }),
  });
  const d = await res.json();
  if (d.success) { showToast('✅ Email verified!'); setTimeout(() => window.location.href = 'dashboard.html', 800); }
  else showToast('❌ Invalid or expired code. Try again.', '#EF4444');
}

async function resendOTP() {
  const token = localStorage.getItem('vendrai_token');
  const res = await fetch(`${API}/auth/resend-otp`, { method:'POST', headers:{'x-session-token':token} });
  const d = await res.json();
  showToast(d.success ? '✅ New code sent to your email!' : '❌ ' + d.error, d.success ? '#25D366' : '#EF4444');
}

function skipVerify() { window.location.href = 'dashboard.html'; }

// ── FORGOT PASSWORD ──
async function doForgot(e) {
  e.preventDefault();
  const res = await fetch(`${API}/auth/forgot-password`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({ email: document.getElementById('f-email').value.trim() }),
  });
  const d = await res.json();
  if (d.success) showToast('✅ Reset code sent! Check your email.');
  else showErr('forgotErr', d.error || 'Error. Please try again.');
}
</script>

</body>
</html>
