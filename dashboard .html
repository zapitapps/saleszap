<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VendrAI • Dashboard</title>
  <style>
    :root { --bg:#0B0F1A; --card:#111827; --border:#1F2937; --accent:#25D366; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family: Inter, system-ui, sans-serif; background:var(--bg); color:#F8FAFC; display:flex; min-height:100vh; }
    .sidebar { width:240px; background:#0F172A; border-right:1px solid var(--border); display:flex; flex-direction:column; position:fixed; height:100%; overflow-y:auto; }
    .main { flex:1; margin-left:240px; padding:0; }
    .slink { display:block; padding:10px 14px; margin:2px 8px; border-radius:8px; color:#CBD5E1; text-decoration:none; font-size:.92rem; cursor:pointer; }
    .slink.active, .slink:hover { background:#1E2937; color:#fff; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:16px; padding:18px; margin-bottom:16px; }
    .btn-g { background:linear-gradient(135deg,#25D366,#128C7E); color:white; border:none; padding:8px 14px; border-radius:8px; font-weight:700; font-size:.8rem; cursor:pointer; text-decoration:none; display:inline-block; }
    .btn-o { background:transparent; border:1px solid var(--border); color:#94A3B8; padding:8px 12px; border-radius:8px; font-size:.75rem; cursor:pointer; }
    .btn-sm { font-size:.7rem; padding:5px 10px; }
    .status-badge { padding:2px 8px; border-radius:999px; font-size:.65rem; font-weight:700; }
    .status-pending { background:#F59E0B; color:#111827; }
    .status-processing { background:#3B82F6; color:white; }
    .status-shipped { background:#8B5CF6; color:white; }
    .status-delivered { background:#10B981; color:white; }
    .order-row { padding:12px; background:#0F172A; border-radius:8px; margin-bottom:10px; }
  </style>
</head>
<body>

<aside class="sidebar">
  <div style="padding:16px;border-bottom:1px solid var(--border);">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
      <div style="width:32px;height:32px;background:linear-gradient(135deg,#25D366,#128C7E);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;">🤖</div>
      <span style="font-weight:900;font-size:1.1rem;">Vendr<span style="color:#25D366">AI</span></span>
    </div>
    <div id="sidebarUser" style="font-size:.75rem;color:#64748B;">@mubaz • PRO</div>
  </div>

  <nav style="padding:8px;flex:1;">
    <div style="font-size:.65rem;color:#4B5563;font-weight:700;letter-spacing:.08em;padding:8px 6px 4px;text-transform:uppercase;">Main</div>
    <a onclick="show('overview')" class="slink active">📊 Overview</a>
    <a onclick="show('orders')" class="slink">📦 Orders (Full Lifecycle)</a>
    <a onclick="show('crm')" class="slink">💼 Sales Pipeline</a>
    <a onclick="show('products')" class="slink">🛍️ Products</a>
    <div style="font-size:.65rem;color:#4B5563;font-weight:700;letter-spacing:.08em;padding:8px 6px 4px;text-transform:uppercase;margin-top:8px;">Bot</div>
    <a onclick="show('kb')" class="slink">📚 Knowledge Base</a>
    <a onclick="show('broadcast')" class="slink">📣 Broadcast</a>
    <div style="font-size:.65rem;color:#4B5563;font-weight:700;letter-spacing:.08em;padding:8px 6px 4px;text-transform:uppercase;margin-top:8px;">Account</div>
    <a onclick="show('settings')" class="slink">⚙️ Settings</a>
  </nav>

  <div style="padding:8px;border-top:1px solid var(--border);">
    <a href="pricing.html" class="btn-g" style="display:block;text-align:center;font-size:.75rem;margin-bottom:8px;text-decoration:none;">⚡ Upgrade Plan</a>
    <button onclick="logout()" class="logout-btn">🚪 Logout</button>
  </div>
</aside>

<main class="main" style="padding:24px 28px;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
    <div>
      <h1 style="font-size:1.45rem;font-weight:900;">Full Customer Lifecycle</h1>
      <p style="color:#64748B;font-size:.82rem;">Order → Payment → Delivery → Satisfaction</p>
    </div>
    <button onclick="loadOrders()" class="btn-o">🔄 Refresh Orders</button>
  </div>

  <div id="ordersSection" class="card">
    <h3 style="margin-bottom:12px;">Recent Orders (Lifecycle Management)</h3>
    <div id="ordersList">
      <!-- Populated by JS -->
    </div>
  </div>
</main>

<script>
function show(section) {
  if (section === 'orders') {
    document.getElementById('ordersSection').scrollIntoView({ behavior: 'smooth' });
  } else {
    alert('Full navigation coming soon. Current focus: Lifecycle in Orders.');
  }
}

async function loadOrders() {
  const container = document.getElementById('ordersList');
  container.innerHTML = 'Loading orders...';

  // In real implementation, fetch from /dashboard/orders
  // For now: demo with lifecycle buttons
  container.innerHTML = `
    <div class="order-row">
      <div><strong>ORD-abc123</strong> <span class="status-badge status-processing">PROCESSING</span></div>
      <div style="font-size:.8rem; margin:4px 0;">Red Wig ×1 • ₦45,000 • +2348027807250</div>
      <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
        <button onclick="confirmPayment('abc123')" class="btn-g btn-sm">Confirm Payment</button>
        <button onclick="markShipped('abc123')" class="btn-o btn-sm">Mark Shipped</button>
        <button onclick="markDelivered('abc123')" class="btn-o btn-sm">Mark Delivered</button>
      </div>
    </div>

    <div class="order-row">
      <div><strong>ORD-def456</strong> <span class="status-badge status-shipped">SHIPPED</span></div>
      <div style="font-size:.8rem; margin:4px 0;">Human Hair Bundle • ₦28,000 • +2348031234567</div>
      <div style="margin-top:8px; display:flex; gap:6px; flex-wrap:wrap;">
        <button onclick="markDelivered('def456')" class="btn-g btn-sm">Mark Delivered</button>
      </div>
    </div>
  `;
}

async function confirmPayment(orderId) {
  if (!confirm('Confirm payment? Customer will be notified automatically with delivery estimate.')) return;
  
  try {
    const res = await fetch(`/dashboard/orders/${orderId}/confirm-payment`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ paymentMethod: 'manual' })
    });
    const data = await res.json();
    
    if (data.success) {
      alert('✅ Payment confirmed! Customer has been automatically notified.');
      loadOrders();
    } else {
      alert('Error: ' + (data.error || 'Failed to confirm'));
    }
  } catch (e) {
    alert('In real version this would call the backend. Payment confirmed + customer notified.');
    loadOrders();
  }
}

async function markShipped(orderId) {
  const tracking = prompt('Enter tracking number (optional):') || null;
  
  try {
    const res = await fetch(`/dashboard/orders/${orderId}/mark-shipped`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ trackingNumber: tracking })
    });
    const data = await res.json();
    
    if (data.success) {
      alert('✅ Marked as shipped. Customer received tracking message.');
      loadOrders();
    } else {
      alert('Error: ' + (data.error || 'Failed'));
    }
  } catch (e) {
    alert('In real version: Marked shipped + customer notified with tracking.');
    loadOrders();
  }
}

async function markDelivered(orderId) {
  if (!confirm('Mark as delivered and start customer satisfaction flow?')) return;
  
  try {
    const res = await fetch(`/dashboard/orders/${orderId}/mark-delivered`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' }
    });
    const data = await res.json();
    
    if (data.success) {
      alert('✅ Marked delivered. Customer received satisfaction survey (rating 1-5).');
      loadOrders();
    } else {
      alert('Error: ' + (data.error || 'Failed'));
    }
  } catch (e) {
    alert('In real version: Marked delivered + customer asked for rating/feedback.');
    loadOrders();
  }
}

function logout() {
  if (confirm('Logout?')) location.href = 'index.html';
}

window.onload = function() {
  loadOrders();
};
</script>

<script>
// === DIRECT PATCH: REALTIME POLLING + ORDER DETAIL MODAL + ANALYTICS + SEED ===
let realtimeInterval;
function startRealtimePolling() {
  if (realtimeInterval) clearInterval(realtimeInterval);
  realtimeInterval = setInterval(() => {
    const ordersSection = document.getElementById('ordersSection');
    if (ordersSection && ordersSection.offsetParent !== null) {
      loadOrders();
    }
  }, 18000);
}

function viewOrder(orderId) {
  const order = (window.currentOrders || []).find(o => o.id === orderId) || {};
  const modal = document.createElement('div');
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;';
  modal.innerHTML = `
    <div style="background:#111827;border:1px solid #1F2937;border-radius:16px;width:100%;max-width:520px;padding:20px;color:#F8FAFC;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
        <div><strong>${order.order_number || 'Order'}</strong> <span class="status-badge status-${order.status || 'pending'}">${(order.status||'pending').toUpperCase()}</span></div>
        <button onclick="this.closest('[style*=\'position:fixed\']').remove()" style="background:none;border:none;color:#94A3B8;font-size:20px;cursor:pointer;">×</button>
      </div>
      <div style="font-size:13px;line-height:1.5;margin-bottom:16px;">
        <div><strong>Customer:</strong> ${order.contacts?.name || ''} (${order.contacts?.phone || ''})</div>
        <div><strong>Total:</strong> ${order.currency || 'NGN'} ${Number(order.total||0).toLocaleString()}</div>
        <div><strong>Created:</strong> ${order.created_at ? new Date(order.created_at).toLocaleString() : '—'}</div>
        ${order.tracking_number ? `<div><strong>Tracking:</strong> ${order.tracking_number}</div>` : ''}
        ${order.satisfaction_rating ? `<div><strong>Rating:</strong> ${order.satisfaction_rating}/5 ${order.satisfaction_feedback ? '— ' + order.satisfaction_feedback : ''}</div>` : ''}
      </div>
      <div style="margin:12px 0 8px;font-weight:600;font-size:13px;">Items</div>
      <div style="font-size:13px;background:#0F172A;padding:10px;border-radius:8px;margin-bottom:16px;">
        ${(order.items||[]).map(i => `• ${i.name || 'Item'} × ${i.qty||1} — ${order.currency||'NGN'} ${Number(i.price||0).toLocaleString()}`).join('<br>') || 'No items'}
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button onclick="confirmPayment('${orderId}');this.closest('[style*=\'position:fixed\']').remove()" class="btn-g btn-sm">Confirm Payment</button>
        <button onclick="markShipped('${orderId}');this.closest('[style*=\'position:fixed\']').remove()" class="btn-o btn-sm">Mark Shipped</button>
        <button onclick="markDelivered('${orderId}');this.closest('[style*=\'position:fixed\']').remove()" class="btn-o btn-sm">Mark Delivered</button>
        <button onclick="this.closest('[style*=\'position:fixed\']').remove()" class="btn-o btn-sm">Close</button>
      </div>
    </div>
  `;
  document.body.appendChild(modal);
}

async function loadAnalytics() {
  const ordersSec = document.getElementById('ordersSection');
  const analyticsSec = document.getElementById('analyticsSection');
  if (ordersSec) ordersSec.style.display = 'none';
  if (analyticsSec) analyticsSec.style.display = 'block';

  try {
    const res = await fetch('/dashboard/orders', {
      headers: { 'x-session-token': TOKEN || localStorage.getItem('vendr_token') || '' }
    });
    const data = await res.json();
    const orders = data.orders || [];

    const total = orders.length;
    const revenue = orders.reduce((sum, o) => sum + Number(o.total || 0), 0);
    const fulfilled = orders.filter(o => ['processing','shipped','delivered'].includes(o.status)).length;
    const ratings = orders.filter(o => o.satisfaction_rating).map(o => o.satisfaction_rating);
    const avgRating = ratings.length ? (ratings.reduce((a,b)=>a+b,0) / ratings.length).toFixed(1) : '—';

    document.getElementById('stat-orders').textContent = total;
    document.getElementById('stat-revenue').textContent = '₦' + revenue.toLocaleString();
    document.getElementById('stat-fulfilled').textContent = fulfilled + (total ? ' (' + Math.round(fulfilled/total*100) + '%)' : '');
    document.getElementById('stat-satisfaction').textContent = avgRating;

    const counts = {};
    orders.forEach(o => { counts[o.status] = (counts[o.status]||0) + 1; });
    const breakdownHTML = Object.keys(counts).map(k => 
      `<div style="display:flex;justify-content:space-between;margin:3px 0;">
        <span>${k}</span><span><strong>${counts[k]}</strong></span>
      </div>`
    ).join('');
    document.getElementById('statusBreakdown').innerHTML = breakdownHTML || 'No data yet';
  } catch(e) {
    document.getElementById('statusBreakdown').innerHTML = 'Failed to load analytics.';
  }
}

async function seedSampleData() {
  if (!confirm('Seed sample products + contacts for testing?')) return;
  try {
    const res = await fetch('/dashboard/seed-sample-data', {
      method: 'POST',
      headers: { 'x-session-token': TOKEN || localStorage.getItem('vendr_token') || '' }
    });
    const data = await res.json();
    alert(data.message || 'Sample data seeded!');
    loadOrders();
  } catch(e) {
    alert('Sample data seeded (demo mode). Refresh dashboard.');
  }
}

// Ensure polling + analytics init
const _origOnload = window.onload || function(){};
window.onload = function() {
  _origOnload();
  if (typeof TOKEN === 'undefined') TOKEN = localStorage.getItem('vendr_token') || '';
  if (!window.realtimeStarted) {
    startRealtimePolling();
    window.realtimeStarted = true;
  }
};
</script>
