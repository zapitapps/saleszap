<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SalesZap • Forgot Password</title>
  <style>
    :root {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-card: rgba(255, 255, 255, 0.7);
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --text-muted: #64748b;
      --border-color: rgba(0, 0, 0, 0.06);
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.05);
      --glass-bg: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(255, 255, 255, 0.2);
      --accent: #25d366;
      --accent-dark: #128c7e;
      --gradient: linear-gradient(135deg, #25d366 0%, #128c7e 100%);
      --radius: 20px;
      --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --input-bg: rgba(255, 255, 255, 0.8);
    }
    [data-theme="dark"] {
      --bg-primary: #0b0f1a;
      --bg-secondary: #111827;
      --bg-card: rgba(17, 24, 39, 0.8);
      --text-primary: #f8fafc;
      --text-secondary: #cbd5e1;
      --text-muted: #94a3b8;
      --border-color: rgba(255, 255, 255, 0.06);
      --shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
      --glass-bg: rgba(17, 24, 39, 0.7);
      --glass-border: rgba(255, 255, 255, 0.08);
      --input-bg: rgba(255, 255, 255, 0.05);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      transition: background var(--transition), color var(--transition);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .container {
      width: 100%;
      max-width: 440px;
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--glass-border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      box-shadow: var(--shadow);
      transition: background var(--transition), border-color var(--transition);
    }
    .logo {
      text-align: center;
      font-weight: 900;
      font-size: 2rem;
      margin-bottom: 0.3rem;
    }
    .logo span { color: var(--accent); }
    .subtitle {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 2rem;
      font-size: 0.95rem;
    }
    .form-group { margin-bottom: 1.2rem; }
    label {
      display: block;
      font-weight: 600;
      font-size: 0.85rem;
      color: var(--text-secondary);
      margin-bottom: 0.3rem;
    }
    input {
      width: 100%;
      padding: 0.8rem 1rem;
      background: var(--input-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s;
      outline: none;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.15);
    }
    .btn-primary {
      width: 100%;
      background: var(--gradient);
      color: #fff;
      font-weight: 700;
      padding: 0.9rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-size: 1rem;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(37, 211, 102, 0.25);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(37, 211, 102, 0.4);
    }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn-secondary {
      width: 100%;
      background: transparent;
      border: 1px solid var(--border-color);
      color: var(--text-secondary);
      padding: 0.8rem;
      border-radius: 50px;
      cursor: pointer;
      font-size: 0.95rem;
      font-weight: 600;
      transition: all 0.2s;
      text-decoration: none;
      display: block;
      text-align: center;
      margin-top: 0.8rem;
    }
    .btn-secondary:hover { background: var(--border-color); }
    .message {
      padding: 0.8rem 1rem;
      border-radius: 12px;
      margin-bottom: 1rem;
      display: none;
      font-size: 0.9rem;
    }
    .message.success { display: block; background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }
    .message.error { display: block; background: rgba(239, 68, 68, 0.15); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); }
    .footer-links {
      display: flex;
      justify-content: center;
      margin-top: 1.5rem;
      font-size: 0.85rem;
      gap: 1.5rem;
    }
    .footer-links a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--accent); }
    .theme-toggle {
      position: fixed;
      top: 1.2rem;
      right: 1.5rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 30px;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      font-size: 1.2rem;
      box-shadow: var(--shadow);
      transition: background var(--transition), border-color var(--transition);
      backdrop-filter: blur(8px);
    }
    .theme-toggle:hover { background: var(--border-color); }
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      animation: fadeUp 0.6s ease forwards;
    }
    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }
    .step-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border-color);
      transition: background 0.3s;
    }
    .step-dot.active { background: var(--accent); }
    .step-dot.done { background: var(--accent); opacity: 0.5; }
    .otp-input-group {
      display: flex;
      gap: 0.8rem;
    }
    .otp-input-group input { flex: 1; }
    .otp-input-group .btn-primary { width: auto; padding: 0.8rem 1.5rem; }
    @media (max-width: 480px) { .container { padding: 2rem 1.5rem; } }
  </style>
</head>
<body>

  <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">🌙</button>

  <div class="container reveal">
    <div class="logo">⚡Sales<span>Zap</span></div>
    <p class="subtitle" id="pageSubtitle">Reset your password in 3 easy steps</p>

    <!-- Step Indicator -->
    <div class="step-indicator">
      <span class="step-dot active" id="step1Dot"></span>
      <span class="step-dot" id="step2Dot"></span>
      <span class="step-dot" id="step3Dot"></span>
    </div>

    <!-- Step 1: Request OTP -->
    <div id="step1">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" required />
        <p style="font-size:0.75rem;color:var(--text-muted);margin-top:0.3rem;">We'll send a 6‑digit code to your email.</p>
      </div>
      <button class="btn-primary" id="requestBtn">Send Reset Code →</button>
    </div>

    <!-- Step 2: Verify OTP -->
    <div id="step2" style="display:none;">
      <p style="font-size:0.9rem;color:var(--text-muted);margin-bottom:1rem;">Enter the 6‑digit code sent to <strong id="emailDisplay"></strong></p>
      <div class="form-group">
        <label for="otp">Verification Code</label>
        <div class="otp-input-group">
          <input type="text" id="otp" placeholder="123456" maxlength="6" inputmode="numeric" pattern="[0-9]{6}" />
          <button class="btn-primary" id="verifyBtn" style="width:auto;padding:0.8rem 1.5rem;">Verify</button>
        </div>
      </div>
      <button class="btn-secondary" id="resendBtn">Resend Code</button>
    </div>

    <!-- Step 3: Set New Password -->
    <div id="step3" style="display:none;">
      <div class="form-group">
        <label for="newPassword">New Password</label>
        <input type="password" id="newPassword" placeholder="At least 8 characters" required />
      </div>
      <div class="form-group">
        <label for="confirmPassword">Confirm Password</label>
        <input type="password" id="confirmPassword" placeholder="Repeat your password" required />
      </div>
      <button class="btn-primary" id="resetBtn">Reset Password →</button>
    </div>

    <!-- Message Area -->
    <div class="message" id="message"></div>

    <div class="footer-links">
      <a href="login.html">← Back to Login</a>
      <a href="easy_signup.html">Create Account</a>
    </div>
  </div>

  <script>
    // ─── THEME ──────────────────────────────────────────────
    (function initTheme() {
      const saved = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeToggle').textContent = theme === 'dark' ? '☀️' : '🌙';
    })();
    document.getElementById('themeToggle').addEventListener('click', function() {
      const current = document.documentElement.getAttribute('data-theme');
      const next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
      this.textContent = next === 'dark' ? '☀️' : '🌙';
    });

    // ─── CONFIG ──────────────────────────────────────────────
    const BACKEND_URL = 'https://vendrai-api.onrender.com';
    let email = '';

    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    const step1Dot = document.getElementById('step1Dot');
    const step2Dot = document.getElementById('step2Dot');
    const step3Dot = document.getElementById('step3Dot');
    const messageEl = document.getElementById('message');

    function showMessage(text, type = 'success') {
      messageEl.textContent = text;
      messageEl.className = 'message ' + type;
    }

    function hideMessage() {
      messageEl.className = 'message';
    }

    function goToStep(step) {
      step1.style.display = step === 1 ? 'block' : 'none';
      step2.style.display = step === 2 ? 'block' : 'none';
      step3.style.display = step === 3 ? 'block' : 'none';
      step1Dot.className = 'step-dot' + (step >= 1 ? ' active' : '');
      step2Dot.className = 'step-dot' + (step >= 2 ? ' active' : '');
      step3Dot.className = 'step-dot' + (step >= 3 ? ' active' : '');
      if (step > 1) step1Dot.className = 'step-dot done';
      if (step > 2) step2Dot.className = 'step-dot done';
      document.getElementById('pageSubtitle').textContent =
        step === 1 ? 'Enter your email to start' :
        step === 2 ? 'Check your inbox for the code' :
        'Create your new password';
    }

    // ─── STEP 1: REQUEST OTP ──────────────────────────────
    document.getElementById('requestBtn').addEventListener('click', async () => {
      email = document.getElementById('email').value.trim();
      if (!email || !email.includes('@')) {
        showMessage('Please enter a valid email address.', 'error');
        return;
      }
      hideMessage();
      const btn = document.getElementById('requestBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Sending...';

      try {
        const res = await fetch(`${BACKEND_URL}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.success) {
          document.getElementById('emailDisplay').textContent = email;
          showMessage('✅ Code sent to your email. Check your inbox (and spam folder).', 'success');
          goToStep(2);
        } else {
          showMessage(data.error || 'Failed to send reset code. Please try again.', 'error');
        }
      } catch (err) {
        showMessage('Could not connect to server. Please check your internet.', 'error');
      }
      btn.disabled = false;
      btn.textContent = 'Send Reset Code →';
    });

    // ─── STEP 2: VERIFY OTP ──────────────────────────────
    document.getElementById('verifyBtn').addEventListener('click', async () => {
      const otp = document.getElementById('otp').value.trim();
      if (!otp || otp.length !== 6 || !/^\d{6}$/.test(otp)) {
        showMessage('Please enter the 6‑digit code.', 'error');
        return;
      }
      hideMessage();
      const btn = document.getElementById('verifyBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Verifying...';

      try {
        // We don't have a dedicated OTP verify endpoint; we'll use the reset endpoint
        // which requires the OTP. We'll store the OTP and move to step 3.
        // The actual reset will happen in step 3.
        showMessage('✅ Code verified! Now set your new password.', 'success');
        goToStep(3);
      } catch (err) {
        showMessage('Verification failed. Please try again.', 'error');
      }
      btn.disabled = false;
      btn.textContent = 'Verify';
    });

    // ─── RESEND OTP ──────────────────────────────────────────
    document.getElementById('resendBtn').addEventListener('click', async () => {
      if (!email) {
        showMessage('Please start over and enter your email.', 'error');
        return;
      }
      hideMessage();
      const btn = document.getElementById('resendBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Resending...';

      try {
        const res = await fetch(`${BACKEND_URL}/auth/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (data.success) {
          showMessage('✅ New code sent to your email.', 'success');
        } else {
          showMessage(data.error || 'Failed to resend. Please try again.', 'error');
        }
      } catch (err) {
        showMessage('Could not connect to server.', 'error');
      }
      btn.disabled = false;
      btn.textContent = 'Resend Code';
    });

    // ─── STEP 3: RESET PASSWORD ──────────────────────────────
    document.getElementById('resetBtn').addEventListener('click', async () => {
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      const otp = document.getElementById('otp').value.trim();

      if (!newPassword || newPassword.length < 8) {
        showMessage('Password must be at least 8 characters.', 'error');
        return;
      }
      if (newPassword !== confirmPassword) {
        showMessage('Passwords do not match.', 'error');
        return;
      }
      if (!otp || otp.length !== 6) {
        showMessage('Verification code is required. Go back to step 2.', 'error');
        return;
      }
      hideMessage();
      const btn = document.getElementById('resetBtn');
      btn.disabled = true;
      btn.textContent = '⏳ Resetting...';

      try {
        const res = await fetch(`${BACKEND_URL}/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, otp, newPassword })
        });
        const data = await res.json();
        if (data.success) {
          showMessage('✅ Password reset successfully! Redirecting to login...', 'success');
          setTimeout(() => window.location.href = 'login.html', 2000);
        } else {
          showMessage(data.error || 'Password reset failed. Please try again.', 'error');
        }
      } catch (err) {
        showMessage('Could not connect to server.', 'error');
      }
      btn.disabled = false;
      btn.textContent = 'Reset Password →';
    });

    // ─── ENTER KEY SUPPORT ──────────────────────────────────
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        if (step1.style.display !== 'none') document.getElementById('requestBtn').click();
        else if (step2.style.display !== 'none') document.getElementById('verifyBtn').click();
        else if (step3.style.display !== 'none') document.getElementById('resetBtn').click();
      }
    });

    // ─── INIT ──────────────────────────────────────────────────
    goToStep(1);
  </script>
</body>
</html>
